$suspend_cmd = systemctl suspend

general {
    before_sleep_cmd = loginctl lock-session
    inhibit_sleep = 3
}

listener {
    timeout = 300 # 5mins
    on-timeout = notify-send "hypridle" "screen will turn off in 10 seconds"
}

listener {
    timeout = 310 # 5mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 420 # 7mins
    on-timeout = loginctl lock-session
}

listener {
    timeout = 600 # 10mins
    on-timeout = $suspend_cmd
}

debug {
    disable_logs = false
}
